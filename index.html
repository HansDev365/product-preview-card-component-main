<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap"
    rel="stylesheet">

  <title>Product preview card component</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main>
    <!-- Product preview card -->
    <article class="product-card">
      <!-- Responsive product image -->
      <picture class="product-image-wrapper">
        <source media="(max-width: 640px)" srcset="./images/image-product-mobile.jpg">
        <img class="product-image" src="./images/image-product-desktop.jpg"
          alt="Gabrielle Essence Eau De Parfum bottle resting beside green leaves">
      </picture>

      <!-- Product details -->
      <div class="card-content">
        <p class="product-category">Perfume</p>
        <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>
        <p class="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.</p>

        <!-- Current and previous prices -->
        <div class="price-group">
          <p class="current-price">$149.99</p>
          <p class="old-price"><s>$169.99</s></p>
        </div>

        <!-- Add to cart button -->
        <button class="cta" type="button">
          <img src="./images/icon-cart.svg" alt="" aria-hidden="true">
          <span>Add to Cart</span>
        </button>
      </div>
    </article>

    <!-- Frontend Mentor attribution footer -->
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="#">dorian365.kodehode@gmail.com</a>.
    </footer>
  </main>
</body>

</html>
